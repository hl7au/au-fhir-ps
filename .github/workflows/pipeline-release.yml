name: (LEGACY) Publish IG - manual trigger to commit to production

# LEGACY / reference only — SUPERSEDED by build-review-publish.yml's gated publish jobs (which sync only
# the /fhir/ps subtree + the shared root files, never a blanket bucket sync). This job does the old
# self-hosted-EC2 full `/webroot → s3://hl7au-fhir-ig` sync; kept manual-dispatch + actor-gated for
# emergency/reference. Prefer build-review-publish.yml for routine publishes.
on:
  workflow_dispatch:

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read  # This is required for actions/checkout
  
jobs:
  build:
    if: github.actor == 'brettesler-ext'  
    runs-on: [self-hosted, Linux, X64]
    # use ig publisher base image https://hub.docker.com/r/hl7fhir/ig-publisher-base
    container: 
      image: hl7fhir/ig-publisher-base  
      volumes:
        - /webroot:/webroot
            
    steps:

    # to save load time can build custom image with dependencies and push to docker hub
    - name: install aws cli
      run: |
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip -o -q awscliv2.zip
        ./aws/install --update
        
    - name: Upload All Updates
      run: |
        aws s3 sync /webroot s3://hl7au-fhir-ig

    - name: Perform Invalidations
      run: |
        aws cloudfront create-invalidation --distribution-id E2U6NB1JDLY5NT --paths "/*"
  
